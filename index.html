<!DOCTYPE html>
<!-- The 'dark' class will be managed by JavaScript -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔빵형 - 사전 예약</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Tailwind CSS dark mode setup
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-[#0B0F19] text-gray-800 dark:text-gray-100 min-h-screen flex flex-col items-center p-6 pt-24 transition-colors duration-300">

    <!-- Top Bar -->
    <header class="fixed top-0 left-0 right-0 bg-white/80 dark:bg-[#0B0F19]/80 backdrop-blur-sm border-b border-gray-200 dark:border-gray-800 z-10 shadow-lg">
        <div class="max-w-md mx-auto p-4 flex items-center justify-between">
                            <img src="nBbro 로고_투명_가로.png" alt="nBbro Logo" id="logo-image" class="h-12 cursor-pointer">            
            <!-- Hamburger Menu Button -->
            <button id="menu-button" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 focus:outline-none">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Popup Modal -->
    <div id="popup-menu" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-11/12 max-w-sm p-6 text-center">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">설정</h3>
                <button id="close-menu-button" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="space-y-2 mb-4">
                <a href="index.html" class="block w-full text-center px-4 py-2.5 text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950/40 hover:bg-blue-100 dark:hover:bg-blue-900/40 rounded-xl text-sm font-semibold transition border border-blue-200 dark:border-blue-900/50">엔빵형 랜딩페이지</a>
                <a href="MVP.html" class="block w-full text-center px-4 py-2.5 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-sm font-semibold transition border border-gray-200 dark:border-gray-700">엔빵형 MVP</a>
            </div>
            <button id="theme-toggle-button" class="w-full text-left px-4 py-3 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-between rounded-lg border border-gray-100 dark:border-gray-700">
                <span id="theme-toggle-text">다크 모드</span>
                <svg id="theme-icon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"></svg>
            </button>
        </div>
    </div>


    <!-- Hero Section -->
    <main class="max-w-md w-full text-center space-y-8 mt-8">
        <div class="space-y-4">
            <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white sm:text-4xl">
                손절하지 마세요.<br>
                <span class="text-blue-500">엔빵형</span>한테 맡기세요.
            </h1>
            <p class="text-sm text-gray-600 dark:text-gray-400">
                합법적인 테두리 안에서 빌런의 멘탈을 흔드는 가장 똑똑한 정산 스케줄러
            </p>
            <div id="counter-badge" class="bg-white dark:bg-white/10 border border-gray-200 dark:border-white/20 rounded-full px-4 py-2 text-sm text-gray-700 dark:text-white inline-block shadow-md">
                현재 <span id="waitlist-count" class="font-bold text-blue-500">...</span>명의 리더들이 엔빵형 등판을 대기 중!
            </div>
            <p id="error-message" class="text-red-500 text-xs mt-2 h-4"></p>
        </div>

        <!-- 정산 시작하러 가기 버튼 -->
        <div class="w-full">
            <a href="MVP.html" class="block w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-6 rounded-2xl transition duration-200 text-center shadow-lg shadow-blue-500/30 transform active:scale-[0.98] text-base">
                정산 시작하러 가기
            </a>
        </div>

        <div class="bg-white dark:bg-[#161F30] p-6 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-xl text-left space-y-4">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                엔빵형 사전 예약
            </h2>
            <form id="waitlistForm" class="space-y-3">
                <input type="text" id="name" placeholder="이름 또는 닉네임" required class="w-full bg-gray-50 dark:bg-[#0B0F19] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition">
                <input type="text" id="contact" placeholder="연락처 또는 이메일 주소" required class="w-full bg-gray-50 dark:bg-[#0B0F19] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition">
                <button type="submit" id="submit-button" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition duration-200 shadow-lg shadow-blue-500/30">
                    엔빵형 등판 대기하기
                </button>
            </form>
        </div>
    </main>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- THEME SWITCHER LOGIC ---
            const menuButton = document.getElementById('menu-button');
            const popupMenu = document.getElementById('popup-menu');
            const closeMenuButton = document.getElementById('close-menu-button');
            const themeToggleButton = document.getElementById('theme-toggle-button');
            const themeToggleText = document.getElementById('theme-toggle-text');
            const themeIcon = document.getElementById('theme-icon');
            const logoImage = document.getElementById('logo-image');
            
            const lightLogo = 'nBbro 로고_투명_가로.png';
            const darkLogo = 'nBbro 로고_투명다크_가로.png';
            const sunIcon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-8.66l-.707-.707M4.04 4.04l-.707-.707m15.92 0l-.707.707M4.04 19.96l-.707.707M21 12h-1M4 12H3m16.24-4.24l.707-.707M4.76 4.76l.707-.707M12 18a6 6 0 100-12 6 6 0 000 12z" />`;
            const moonIcon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    logoImage.src = darkLogo;
                    themeToggleText.innerText = '라이트 모드';
                    themeIcon.innerHTML = sunIcon;
                } else {
                    document.documentElement.classList.remove('dark');
                    logoImage.src = lightLogo;
                    themeToggleText.innerText = '다크 모드';
                    themeIcon.innerHTML = moonIcon;
                }
            }

            menuButton.addEventListener('click', () => popupMenu.classList.remove('hidden'));
            closeMenuButton.addEventListener('click', () => popupMenu.classList.add('hidden'));

            themeToggleButton.addEventListener('click', () => {
                const isDarkMode = document.documentElement.classList.contains('dark');
                const newTheme = isDarkMode ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });

            // --- SUPABASE & FORM LOGIC ---
            const supabaseUrl = 'https://wyntbetmszlycqdxoyre.supabase.co';
            const supabaseKey = 'sb_publishable_d-Hfj1cYxJ8utFWzdsGUnA_WjV8kJEd';
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

            const waitlistCountElement = document.getElementById('waitlist-count');
            const waitlistForm = document.getElementById('waitlistForm');
            const submitButton = document.getElementById('submit-button');
            const counterBadge = document.getElementById('counter-badge');
            const errorMessageElement = document.getElementById('error-message');

            const baseCount = 0;
            let currentCount = 0;

            function showError(message) {
                errorMessageElement.innerText = `오류: ${message}`;
                console.error('Supabase Error:', message);
            }

            function updateCount(newCount) {
                currentCount = newCount;
                const displayCount = currentCount + baseCount;
                waitlistCountElement.innerText = displayCount;
            }

            async function loadInitialCount() {
                counterBadge.classList.add('animate-pulse');
                errorMessageElement.innerText = '';
                
                const { count, error } = await supabaseClient
                    .from('waitlist')
                    .select('*', { count: 'exact', head: true });

                if (error) {
                    waitlistCountElement.innerText = '???';
                    showError(error.message);
                } else {
                    updateCount(count);
                }
                counterBadge.classList.remove('animate-pulse');
            }

            waitlistForm.addEventListener('submit', async (event) => {
                event.preventDefault();
                
                const name = document.getElementById('name').value;
                const contact = document.getElementById('contact').value;
                
                submitButton.disabled = true;
                submitButton.innerText = '등록 중...';
                errorMessageElement.innerText = '';

                const { data, error } = await supabaseClient
                    .from('waitlist')
                    .insert([{ name, contact }]);

                if (error) {
                    showError(error.message);
                    alert('사전 예약 등록에 실패했습니다. 오류 메시지를 확인해주세요.');
                    submitButton.disabled = false;
                    submitButton.innerText = '엔빵형 등판 대기하기';
                } else {
                    submitButton.innerText = '예약 완료!';
                    updateCount(currentCount + 1);
                    waitlistForm.reset();
                    setTimeout(() => {
                       submitButton.disabled = true;
                    }, 3000);
                }
            });

            // --- INITIAL PAGE LOAD ---
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));
            
            loadInitialCount();
        });
    </script>

</body>
</html>
