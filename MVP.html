<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔빵형 - 정산 현황판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>

<body class="bg-gray-100 dark:bg-[#0B0F19] text-gray-800 dark:text-gray-100 min-h-screen flex flex-col items-center justify-start p-4 pt-28 pb-24 sm:p-6 sm:pt-28 transition-colors duration-300 select-none">

    <!-- Top Bar -->
    <header class="fixed top-0 left-0 right-0 bg-white/80 dark:bg-[#0B0F19]/80 backdrop-blur-sm border-b border-gray-200 dark:border-gray-800 z-10 shadow-lg">
        <div class="max-w-md mx-auto p-4 flex items-center justify-between">
            <img src="nBbro 로고_투명_가로.png" alt="nBbro Logo" id="logo-image" class="h-12 cursor-pointer">            
            <button id="menu-button" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-200 focus:outline-none">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Popup Modal -->
    <div id="popup-menu" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-11/12 max-w-sm p-6 text-center">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">설정</h3>
                <button id="close-menu-button" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="space-y-2 mb-4">
                <a href="index.html" class="block w-full text-center px-4 py-2.5 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-sm font-semibold transition border border-gray-200 dark:border-gray-700">엔빵형 랜딩페이지</a>
                <a href="MVP.html" class="block w-full text-center px-4 py-2.5 text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950/40 hover:bg-blue-100 dark:hover:bg-blue-900/40 rounded-xl text-sm font-semibold transition border border-blue-200 dark:border-blue-900/50">엔빵형 MVP</a>
            </div>
            <button id="theme-toggle-button" class="w-full text-left px-4 py-3 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-between rounded-lg border border-gray-100 dark:border-gray-700">
                <span id="theme-toggle-text">다크 모드</span>
                <svg id="theme-icon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"></svg>
            </button>
        </div>
    </div>

    <!-- 입금 확인 팝업 모달 -->
    <div id="deposit-confirm-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 animate-fade-in">
        <div class="bg-white dark:bg-[#161F30] rounded-2xl shadow-2xl w-11/12 max-w-sm p-6 text-center relative border border-gray-100 dark:border-gray-800">
            <!-- 닫기 버튼 -->
            <button id="close-deposit-modal" class="absolute top-4 right-4 p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 focus:outline-none">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div class="space-y-4">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 dark:bg-blue-950 text-blue-600 dark:text-blue-400">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h3 class="text-lg font-black text-gray-900 dark:text-white">입금 확인</h3>
                <p class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed font-medium">
                    <span id="confirm-target-name" class="font-black text-gray-600 dark:text-gray-300 text-sm"></span>님의 송금이<br>
                    실제로 입금되었나요?
                </p>
                <div class="flex gap-3 pt-2">
                    <button id="confirm-reject-btn" class="w-1/2 bg-blue-100 text-blue-600 hover:bg-blue-200 dark:bg-blue-950/60 dark:text-blue-400 dark:hover:bg-blue-900/60 font-bold py-3.5 rounded-xl transition text-sm">
                        거절
                    </button>
                    <button id="confirm-approve-btn" class="w-1/2 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition text-sm shadow-md shadow-blue-500/25">
                        승인
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 메인 컨테이너 -->
    <main class="max-w-md w-full space-y-8">

        <!-- [STEP 1] 정산 입력란 -->
        <section class="bg-white dark:bg-[#161F30] p-6 rounded-2xl shadow-xl space-y-5 transition-colors duration-300">
            <h2 class="text-lg font-black text-black dark:text-white uppercase tracking-wider">엔빵형 정산 현황판</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-500 dark:text-gray-300 mb-1.5 font-medium">방장 이름</label>
                    <input type="text" id="ownerName" placeholder="예: 김방장"
                        class="w-full bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-4 py-3.5 text-lg font-bold text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors duration-300">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 dark:text-gray-300 mb-1.5 font-medium">총 지출 금액 (원)</label>
                    <input type="number" id="totalAmount" placeholder="예: 100000"
                        class="w-full bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-4 py-3.5 text-lg font-bold text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors duration-300">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 dark:text-gray-300 mb-1.5 font-medium">정산할 인원 (방장 포함 총 인원)</label>
                    <input type="number" id="totalPeople" placeholder="예: 4" min="2"
                        class="w-full bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-4 py-3.5 text-lg font-bold text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors duration-300">
                </div>
                <div class="bg-gray-50 dark:bg-[#0B0F19] rounded-xl p-4 text-center transition-colors duration-300">
                    <p class="text-xs text-gray-500 dark:text-gray-300">1인당 정산 금액</p>
                    <p class="text-2xl font-black text-gray-950 dark:text-white mt-1"><span id="calcResult" class="text-gray-950 dark:text-white">0</span> 원
                    </p>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 dark:text-gray-300 mb-1.5 font-medium">돈을 받을 내 계좌번호</label>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="bankName"
                            class="w-full bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-3 py-3 text-xs text-gray-950 dark:text-white focus:outline-none focus:border-blue-500 transition-colors duration-300">
                            <option value="">은행 선택</option>
                            <option value="토스뱅크">토스뱅크</option>
                            <option value="카카오뱅크">카카오뱅크</option>
                            <option value="신한">신한</option>
                            <option value="국민">국민</option>
                            <option value="direct">직접 입력</option>
                        </select>
                        <input type="text" id="bankNameDirect" placeholder="은행명 직접 입력"
                            class="hidden w-full bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-3 py-3 text-xs text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors duration-300">
                    </div>
                    <input type="text" id="accountNumber" placeholder="계좌번호 입력"
                        class="w-full mt-2 bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-3 py-3 text-xs text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors duration-300">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 dark:text-gray-300 mb-1.5 font-medium">정산 마감 기한 설정</label>
                    <div class="grid grid-cols-4 gap-2">
                        <div class="flex items-center bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-3 py-3 focus-within:border-blue-500 transition-colors duration-300">
                            <input type="number" id="deadlineMonth" min="1" max="12" placeholder="월"
                                class="w-full bg-transparent text-xs text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none text-center pr-1">
                            <span class="text-[10px] text-gray-400 dark:text-gray-500 font-bold shrink-0">월</span>
                        </div>
                        <div class="flex items-center bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-3 py-3 focus-within:border-blue-500 transition-colors duration-300">
                            <input type="number" id="deadlineDay" min="1" max="31" placeholder="일"
                                class="w-full bg-transparent text-xs text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none text-center pr-1">
                            <span class="text-[10px] text-gray-400 dark:text-gray-500 font-bold shrink-0">일</span>
                        </div>
                        <div class="flex items-center bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-3 py-3 focus-within:border-blue-500 transition-colors duration-300">
                            <input type="number" id="deadlineHour" min="0" max="23" placeholder="시"
                                class="w-full bg-transparent text-xs text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none text-center pr-1">
                            <span class="text-[10px] text-gray-400 dark:text-gray-500 font-bold shrink-0">시</span>
                        </div>
                        <div class="flex items-center bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-3 py-3 focus-within:border-blue-500 transition-colors duration-300">
                            <input type="number" id="deadlineMinute" min="0" max="59" placeholder="분"
                                class="w-full bg-transparent text-xs text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none text-center pr-1">
                            <span class="text-[10px] text-gray-400 dark:text-gray-500 font-bold shrink-0">분</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- [STEP 2] 빌런 설정 -->
        <section class="bg-white dark:bg-[#161F30] p-6 rounded-2xl shadow-xl space-y-4 transition-colors duration-300">
            <h2 class="text-lg font-black text-black dark:text-white uppercase tracking-wider">미입금 빌런(타깃) 설정</h2>
            <div class="space-y-3">
                <div class="flex flex-col gap-2">
                    <input type="text" id="villainNameInput" placeholder="빌런 이름"
                        class="w-full bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-4 py-3 text-xs text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors duration-300">
                    <input type="text" id="villainContactInput" placeholder="빌런 연락처 (예: 010-XXXX-XXXX)"
                        class="w-full bg-gray-50 dark:bg-[#0B0F19] border border-transparent rounded-xl px-4 py-3 text-xs text-gray-950 dark:text-white placeholder-gray-400 dark:placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors duration-300">
                    <button id="addVillainBtn"
                        class="w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 font-bold py-3 rounded-xl transition">
                        + 추가
                    </button>
                </div>

                <!-- 추가된 빌런 명단 -->
                <div class="space-y-2">
                    <h3 class="text-sm font-bold text-gray-700 dark:text-gray-300">빌런 명단</h3>
                    <div id="villainListContainer" class="space-y-2">
                        <!-- Added villains will appear here -->
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-4 border-t border-gray-100 dark:border-gray-700">
                    <label class="flex items-center justify-center p-3 rounded-xl bg-blue-100 text-blue-700 dark:bg-blue-950 dark:text-blue-400 text-xs font-semibold cursor-pointer select-none">
                        <input type="radio" name="mode" value="soft" class="sr-only" checked> 순한맛 알림
                    </label>
                    <label class="flex items-center justify-center p-3 rounded-xl bg-blue-600 text-white text-xs font-semibold cursor-pointer select-none">
                        <input type="radio" name="mode" value="hard" class="sr-only"> 매운맛 독촉
                    </label>
                </div>
            </div>
        </section>

        <!-- [STEP 3] 정산 확인 요청 명단 -->
        <section class="bg-white dark:bg-[#161F30] p-6 rounded-2xl shadow-xl space-y-4 transition-colors duration-300">
            <h2 class="text-lg font-black text-black dark:text-white uppercase tracking-wider">정산 확인 요청 명단</h2>
            <div id="requestListContainer" class="space-y-2">
                <!-- 정산 확인 요청 목록이 여기에 나타납니다 -->
            </div>
        </section>

        <button id="generateBtn"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition duration-200 transform active:scale-[0.98] text-sm shadow-lg shadow-blue-500/30">
            엔빵형 링크 생성
        </button>

        <button id="copyStatusLinkBtn"
            class="w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 font-bold py-4 rounded-xl transition duration-200 text-sm">
            현황판 링크 복사
        </button>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuButton = document.getElementById('menu-button');
            const popupMenu = document.getElementById('popup-menu');
            const closeMenuButton = document.getElementById('close-menu-button');
            const themeToggleButton = document.getElementById('theme-toggle-button');
            const themeToggleText = document.getElementById('theme-toggle-text');
            const themeIcon = document.getElementById('theme-icon');
            const logoImage = document.getElementById('logo-image');
            
            const lightLogo = 'nBbro 로고_투명_가로.png';
            const darkLogo = 'nBbro 로고_투명다크_가로.png';
            const sunIcon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-8.66l-.707-.707M4.04 4.04l-.707-.707m15.92 0l-.707.707M4.04 19.96l-.707.707M21 12h-1M4 12H3m16.24-4.24l.707-.707M4.76 4.76l.707-.707M12 18a6 6 0 100-12 6 6 0 000 12z" />`;
            const moonIcon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    if (logoImage) logoImage.src = darkLogo;
                    themeToggleText.innerText = '라이트 모드';
                    themeIcon.innerHTML = sunIcon;
                } else {
                    document.documentElement.classList.remove('dark');
                    if (logoImage) logoImage.src = lightLogo;
                    themeToggleText.innerText = '다크 모드';
                    themeIcon.innerHTML = moonIcon;
                }
            }

            menuButton.addEventListener('click', () => popupMenu.classList.remove('hidden'));
            closeMenuButton.addEventListener('click', () => popupMenu.classList.add('hidden'));

            themeToggleButton.addEventListener('click', () => {
                const isDarkMode = document.documentElement.classList.contains('dark');
                const newTheme = isDarkMode ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });

            if (logoImage) { logoImage.addEventListener('click', () => { location.reload(); }); }

            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

            // Bank selection logic
            const bankNameSelect = document.getElementById('bankName');
            const bankNameDirect = document.getElementById('bankNameDirect');
            bankNameSelect.addEventListener('change', () => {
                if (bankNameSelect.value === 'direct') {
                    bankNameDirect.classList.remove('hidden');
                } else {
                    bankNameDirect.classList.add('hidden');
                    bankNameDirect.value = '';
                }
            });

            const totalAmountInput = document.getElementById('totalAmount');
            const totalPeopleInput = document.getElementById('totalPeople');
            const calcResultEl = document.getElementById('calcResult');

            function calculateNbbang() {
                const amount = parseFloat(totalAmountInput.value) || 0;
                const people = parseInt(totalPeopleInput.value) || 0;
                if (amount > 0 && people > 1) {
                    calcResultEl.innerText = Math.floor(amount / people).toLocaleString();
                } else {
                    calcResultEl.innerText = '0';
                }
                // nbbang 금액 계산 후 룸 컨텍스트 갱신
                if (typeof updateRoomContext === 'function') {
                    updateRoomContext();
                }
            }
            totalAmountInput.addEventListener('input', calculateNbbang);
            totalPeopleInput.addEventListener('input', calculateNbbang);

            // 정산 마감 기한 초기값 및 유효성 검사 설정
            const dlMInput = document.getElementById('deadlineMonth');
            const dlDInput = document.getElementById('deadlineDay');
            const dlHInput = document.getElementById('deadlineHour');
            const dlMinInput = document.getElementById('deadlineMinute');

            const now = new Date();
            const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
            dlMInput.value = tomorrow.getMonth() + 1;
            dlDInput.value = tomorrow.getDate();
            dlHInput.value = tomorrow.getHours();
            dlMinInput.value = tomorrow.getMinutes();

            function clampInput(input, min, max) {
                input.addEventListener('input', () => {
                    let val = parseInt(input.value);
                    if (isNaN(val)) return;
                    if (val < min) input.value = min;
                    if (val > max) input.value = max;
                });
            }
            clampInput(dlMInput, 1, 12);
            clampInput(dlDInput, 1, 31);
            clampInput(dlHInput, 0, 23);
            clampInput(dlMinInput, 0, 59);

            // 방 컨텍스트 및 상태 관리 (LocalStorage 연동)
            let villainList = [];
            let requestList = [];

            const villainNameInput = document.getElementById('villainNameInput');
            const villainContactInput = document.getElementById('villainContactInput');
            const addVillainBtn = document.getElementById('addVillainBtn');
            const villainListContainer = document.getElementById('villainListContainer');
            const requestListContainer = document.getElementById('requestListContainer');

            function getRoomId() {
                const ownerName = document.getElementById('ownerName').value.trim() || '김방장';
                const perAmount = document.getElementById('calcResult').innerText.replace(/,/g, '') || '0';
                const bankSelect = document.getElementById('bankName');
                const bankDirect = document.getElementById('bankNameDirect');
                const bankName = bankSelect.value === 'direct' ? bankDirect.value.trim() : bankSelect.value;
                const accountNumber = document.getElementById('accountNumber').value.trim();
                
                return `${ownerName}_${perAmount}_${bankName}_${accountNumber}`;
            }

            function updateRoomContext() {
                const roomId = getRoomId();
                
                // 1. 빌런 목록 로드
                const savedVillains = localStorage.getItem(`villains_${roomId}`);
                if (savedVillains) {
                    villainList = JSON.parse(savedVillains);
                } else {
                    villainList = [];
                }
                renderVillainList();
                
                // 2. 요청 목록 로드
                const savedRequests = localStorage.getItem(`requests_${roomId}`);
                if (savedRequests) {
                    requestList = JSON.parse(savedRequests);
                } else {
                    requestList = [];
                }
                renderRequestList();
            }

            function renderVillainList() {
                villainListContainer.innerHTML = '';
                if (villainList.length === 0) {
                    villainListContainer.innerHTML = `<p class="text-xs text-gray-400 dark:text-gray-500 text-center py-2">등록된 빌런이 없습니다.</p>`;
                    return;
                }
                villainList.forEach((villain, index) => {
                    const card = document.createElement('div');
                    card.className = 'flex justify-between items-center bg-[#F4F4F4] dark:bg-[#0B0F19] rounded-xl px-4 py-3';
                    const contactText = villain.contact ? `<span class="text-gray-500 dark:text-gray-400">(${villain.contact})</span>` : '';
                    card.innerHTML = `
                        <div class="text-xs">
                            <span class="font-bold text-gray-950 dark:text-white">${villain.name}</span>
                            ${contactText}
                        </div>
                        <button class="text-gray-400 hover:text-red-500 font-bold" onclick="removeVillain(${index})">&times;</button>
                    `;
                    villainListContainer.appendChild(card);
                });
            }

            function renderRequestList() {
                if (!requestListContainer) return;
                requestListContainer.innerHTML = '';
                if (requestList.length === 0) {
                    requestListContainer.innerHTML = `<p class="text-xs text-gray-400 dark:text-gray-500 text-center py-2">대기 중인 요청이 없습니다.</p>`;
                    return;
                }
                requestList.forEach((name, index) => {
                    const card = document.createElement('div');
                    card.className = 'flex justify-between items-center bg-[#F4F4F4] dark:bg-[#0B0F19] rounded-xl px-4 py-3';
                    card.innerHTML = `
                        <div class="text-xs font-bold text-gray-950 dark:text-white">
                            ${name}
                        </div>
                        <button class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition" onclick="approveRequest(${index})">
                            승인
                        </button>
                    `;
                    requestListContainer.appendChild(card);
                });
            }

            window.removeVillain = (index) => {
                villainList.splice(index, 1);
                const roomId = getRoomId();
                localStorage.setItem(`villains_${roomId}`, JSON.stringify(villainList));
                renderVillainList();
            };

            // 입금 확인 모달 엘리먼트 및 처리 변수
            const depositConfirmModal = document.getElementById('deposit-confirm-modal');
            const confirmTargetName = document.getElementById('confirm-target-name');
            const confirmApproveBtn = document.getElementById('confirm-approve-btn');
            const confirmRejectBtn = document.getElementById('confirm-reject-btn');
            const closeDepositModalBtn = document.getElementById('close-deposit-modal');
            let pendingRequestName = null;

            window.approveRequest = (index) => {
                const targetName = requestList[index];
                if (!targetName) return;
                
                pendingRequestName = targetName;
                confirmTargetName.innerText = targetName;
                depositConfirmModal.classList.remove('hidden');
            };

            function closeDepositConfirmModal() {
                depositConfirmModal.classList.add('hidden');
                pendingRequestName = null;
            }

            closeDepositModalBtn.addEventListener('click', closeDepositConfirmModal);
            depositConfirmModal.addEventListener('click', (e) => {
                if (e.target === depositConfirmModal) {
                    closeDepositConfirmModal();
                }
            });

            // 모달 내 '승인' 버튼 클릭 시
            confirmApproveBtn.addEventListener('click', () => {
                console.log('DEBUG: confirmApproveBtn clicked');
                if (!pendingRequestName) {
                    console.log('DEBUG: no pendingRequestName');
                    return;
                }
                
                const approvedName = pendingRequestName;
                const roomId = getRoomId();
                console.log('DEBUG: Approving', approvedName, 'in room', roomId);
                
                // 1. 요청 목록에서 제거
                const requestIndex = requestList.indexOf(approvedName);
                if (requestIndex !== -1) {
                    requestList.splice(requestIndex, 1);
                    localStorage.setItem(`requests_${roomId}`, JSON.stringify(requestList));
                }
                
                // 2. 빌런 목록에서도 제거
                const villainIndex = villainList.findIndex(v => v.name === approvedName);
                const wasVillain = villainIndex !== -1;
                console.log('DEBUG_MVP_APPROVAL_ROOMID:', { roomId, approvedName, villainIndex, villainList, wasVillain });
                if (wasVillain) {
                    villainList.splice(villainIndex, 1);
                    localStorage.setItem(`villains_${roomId}`, JSON.stringify(villainList));
                }
                
                // 3. UI 업데이트 및 모달 닫기
                updateRoomContext();
                closeDepositConfirmModal();
                
                let message = `'${approvedName}' 님의 정산 요청을 승인했습니다.`;
                if (wasVillain) {
                    message += ' 빌런 명단에서도 제거되었습니다.';
                }
                alert(message);
            });

            // 모달 내 '거절' 버튼 클릭 시
            confirmRejectBtn.addEventListener('click', () => {
                if (!pendingRequestName) return;
                
                const rejectedName = pendingRequestName;
                const roomId = getRoomId();
                
                // 1. 요청 목록에서만 제거 (요청 거절)
                const requestIndex = requestList.indexOf(rejectedName);
                if (requestIndex !== -1) {
                    requestList.splice(requestIndex, 1);
                    localStorage.setItem(`requests_${roomId}`, JSON.stringify(requestList));
                }
                
                // 2. 빌런 목록에는 유지 (미입금 상태)
                
                // 3. UI 업데이트 및 모달 닫기
                updateRoomContext();
                closeDepositConfirmModal();
                alert(`'${rejectedName}' 님의 정산 요청을 거절했습니다.`);
            });

            addVillainBtn.addEventListener('click', () => {
                const name = villainNameInput.value.trim();
                const contact = villainContactInput.value.trim();
                if (name) {
                    villainList.push({ name, contact: contact || '' });
                    const roomId = getRoomId();
                    localStorage.setItem(`villains_${roomId}`, JSON.stringify(villainList));
                    villainNameInput.value = '';
                    villainContactInput.value = '';
                    renderVillainList();
                } else {
                    alert('빌런 이름을 입력해주세요.');
                }
            });

            // 입력값 변경 시 룸 컨텍스트 실시간 업데이트
            const inputs = ['ownerName', 'totalAmount', 'totalPeople', 'bankName', 'bankNameDirect', 'accountNumber'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', updateRoomContext);
                    el.addEventListener('change', updateRoomContext);
                }
            });

            // storage 이벤트 감지로 다른 탭의 변경 사항 실시간 반영
            window.addEventListener('storage', (e) => {
                const roomId = getRoomId();
                if (e.key === `requests_${roomId}` || e.key === `villains_${roomId}`) {
                    updateRoomContext();
                }
            });

            // 초기 로드 시 룸 컨텍스트 로드
            updateRoomContext();

            // URL 파라미터가 있다면 폼 채우기
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('owner')) {
                document.getElementById('ownerName').value = decodeURIComponent(urlParams.get('owner'));
                document.getElementById('totalAmount').value = decodeURIComponent(urlParams.get('amount'));
                document.getElementById('totalPeople').value = decodeURIComponent(urlParams.get('people'));
                
                const bank = decodeURIComponent(urlParams.get('bank'));
                const bankSelect = document.getElementById('bankName');
                const bankDirect = document.getElementById('bankNameDirect');
                if (['토스뱅크', '카카오뱅크', '신한', '국민'].includes(bank)) {
                    bankSelect.value = bank;
                } else if (bank) {
                    bankSelect.value = 'direct';
                    bankDirect.value = bank;
                    bankDirect.classList.remove('hidden');
                }
                document.getElementById('accountNumber').value = decodeURIComponent(urlParams.get('account'));
                
                const mode = urlParams.get('mode');
                if (mode) {
                    document.querySelector(`input[name="mode"][value="${mode}"]`).checked = true;
                }

                if (urlParams.has('dlM')) {
                    document.getElementById('deadlineMonth').value = urlParams.get('dlM');
                    document.getElementById('deadlineDay').value = urlParams.get('dlD');
                    document.getElementById('deadlineHour').value = urlParams.get('dlH');
                    document.getElementById('deadlineMinute').value = urlParams.get('dlMin');
                }

                calculateNbbang();
                updateRoomContext();
            }

            document.getElementById('generateBtn').addEventListener('click', () => {
                const ownerName = document.getElementById('ownerName').value || '김방장';
                const perAmount = document.getElementById('calcResult').innerText.replace(/,/g, '');
                
                // 은행 정보
                const bankSelect = document.getElementById('bankName');
                const bankDirect = document.getElementById('bankNameDirect');
                const bankName = bankSelect.value === 'direct' ? bankDirect.value : bankSelect.value;
                const accountNumber = document.getElementById('accountNumber').value;
                
                // 모드 정보
                const mode = document.querySelector('input[name="mode"]:checked').value;
                // 빌런 명단 JSON 문자열로 전달
                const villains = JSON.stringify(villainList);
                
                // 마감 기한 정보
                const dlM = dlMInput.value;
                const dlD = dlDInput.value;
                const dlH = dlHInput.value;
                const dlMin = dlMinInput.value;
                
                const baseUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                let targetUrl = `${baseUrl}MVP2.html?owner=${encodeURIComponent(ownerName)}&amount=${encodeURIComponent(perAmount)}&bank=${encodeURIComponent(bankName)}&account=${encodeURIComponent(accountNumber)}&mode=${encodeURIComponent(mode)}&villains=${encodeURIComponent(villains)}`;
                if (dlM && dlD) {
                    targetUrl += `&dlM=${encodeURIComponent(dlM)}&dlD=${encodeURIComponent(dlD)}&dlH=${encodeURIComponent(dlH)}&dlMin=${encodeURIComponent(dlMin)}`;
                }
                
                navigator.clipboard.writeText(targetUrl).then(() => {
                    const modeText = mode === 'hard' ? '매운맛 독촉' : '순한맛 알림';
                    alert(`정산 및 ${modeText} 활성화 완료. 정산 현황판 링크가 클립보드에 복사되었습니다.`);
                }).catch(err => {
                    console.error('링크 복사 실패:', err);
                    alert('링크 복사에 실패했습니다.');
                });
            });

            document.getElementById('copyStatusLinkBtn').addEventListener('click', () => {
                const ownerName = document.getElementById('ownerName').value || '김방장';
                const totalAmount = document.getElementById('totalAmount').value || '0';
                const totalPeople = document.getElementById('totalPeople').value || '0';
                
                const bankSelect = document.getElementById('bankName');
                const bankDirect = document.getElementById('bankNameDirect');
                const bankName = bankSelect.value === 'direct' ? bankDirect.value : bankSelect.value;
                const accountNumber = document.getElementById('accountNumber').value;
                
                const mode = document.querySelector('input[name="mode"]:checked').value;
                const villains = JSON.stringify(villainList);
                
                const dlM = dlMInput.value;
                const dlD = dlDInput.value;
                const dlH = dlHInput.value;
                const dlMin = dlMinInput.value;
                
                const baseUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
                let targetUrl = `${baseUrl}MVP.html?owner=${encodeURIComponent(ownerName)}&amount=${encodeURIComponent(totalAmount)}&people=${encodeURIComponent(totalPeople)}&bank=${encodeURIComponent(bankName)}&account=${encodeURIComponent(accountNumber)}&mode=${encodeURIComponent(mode)}&villains=${encodeURIComponent(villains)}`;
                if (dlM && dlD) {
                    targetUrl += `&dlM=${encodeURIComponent(dlM)}&dlD=${encodeURIComponent(dlD)}&dlH=${encodeURIComponent(dlH)}&dlMin=${encodeURIComponent(dlMin)}`;
                }

                navigator.clipboard.writeText(targetUrl).then(() => {
                    alert('현재 설정이 포함된 현황판 설정 페이지 링크가 복사되었습니다.');
                }).catch(err => {
                    console.error('링크 복사 실패:', err);
                    alert('링크 복사에 실패했습니다.');
                });
            });
        });
    </script>
</body>
</html>
