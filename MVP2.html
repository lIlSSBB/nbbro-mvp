<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔빵형 - 정산 현황판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>

<body class="bg-gray-100 dark:bg-[#0B0F19] text-gray-800 dark:text-gray-100 min-h-screen flex flex-col items-center justify-start p-4 sm:p-6 select-none transition-colors duration-300">

    <!-- Top Bar -->
    <header class="fixed top-0 left-0 right-0 bg-white/80 dark:bg-[#0B0F19]/80 backdrop-blur-sm border-b border-gray-200 dark:border-gray-800 z-10 shadow-lg">
        <div class="max-w-md mx-auto p-4 flex items-center justify-between">
            <img src="nBbro 로고_투명_가로.png" alt="nBbro Logo" id="logo-image" class="h-12 cursor-pointer">            
            <button id="menu-button" class="p-2 rounded-md hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-200 focus:outline-none">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Popup Modal -->
    <div id="popup-menu" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-11/12 max-w-sm p-6 text-center">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">설정</h3>
                <button id="close-menu-button" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-200">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="space-y-2 mb-4">
                <a href="index.html" class="block w-full text-center px-4 py-2.5 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-sm font-semibold transition border border-gray-200 dark:border-gray-700">엔빵형 랜딩페이지</a>
                <a href="MVP.html" class="block w-full text-center px-4 py-2.5 text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950/40 hover:bg-blue-100 dark:hover:bg-blue-900/40 rounded-xl text-sm font-semibold transition border border-blue-200 dark:border-blue-900/50">엔빵형 MVP</a>
            </div>
            <button id="theme-toggle-button" class="w-full text-left px-4 py-3 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-between rounded-lg border border-gray-100 dark:border-gray-700">
                <span id="theme-toggle-text">다크 모드</span>
                <svg id="theme-icon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"></svg>
            </button>
        </div>
    </div>

    <!-- 메인 컨테이너 -->
    <main class="max-w-md w-full space-y-6 mt-24">
        
        <!-- 엔빵형 현황판 섹션 -->
        <section class="flex items-center justify-between">
            <h1 class="text-xl font-black text-gray-900 dark:text-white">엔빵형 현황판</h1>
        </section>

        <!-- [상단 카드] 정산 금액 안내 -->
        <section class="bg-white dark:bg-[#161F30] p-6 rounded-2xl shadow-xl text-center space-y-4 transition-colors duration-300">
            <p class="text-sm font-semibold text-gray-900 dark:text-white"><span class="text-gray-900 dark:text-white font-bold" id="ownerName">김방장</span>
                님이 보낸 정산 요청</p>

            <div class="py-2">
                <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">내가 보낼 금액</p>
                <p class="text-3xl font-black text-gray-900 dark:text-white"><span id="perAmount">25,000</span> 원</p>
            </div>

            <!-- 계좌 복사 버튼 영역 -->
            <div
                class="bg-gray-50 dark:bg-[#0B0F19] rounded-xl p-4 flex flex-col items-center justify-center gap-2">
                <p class="text-xs text-gray-500 dark:text-gray-400"><span id="bankName">토스뱅크</span> <span id="accountNumber"
                        class="font-mono text-gray-800 dark:text-gray-200">1000-1234-5678</span></p>
                <button id="copyAccountBtn"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-4 rounded-xl transition">
                    계좌번호 복사하기
                </button>
            </div>
        </section>

        <!-- [하단 카드] 엔빵형의 독촉 경고 스케줄러 상태창 -->
        <section id="warningSection" class="bg-white dark:bg-[#161F30] p-6 rounded-2xl shadow-xl space-y-4 transition-colors duration-300">
            <div class="flex items-center gap-2 text-gray-900 dark:text-white">
                <h3 class="text-sm font-black tracking-wide uppercase">엔빵형 실시간 독촉 대기 상태</h3>
            </div>

            <div class="bg-gray-50 dark:bg-[#0B0F19]/60 rounded-xl p-4 space-y-2">
                <p class="text-xs text-gray-600 dark:text-gray-300 leading-relaxed">
                    현재 이 정산 링크는 <span class="text-gray-900 dark:text-white font-bold">"매운맛 독촉 모드"</span>가 활성화되어 있습니다.
                </p>
                <p class="text-xs text-gray-500 dark:text-gray-400">
                    미입금 시 <span class="text-gray-900 dark:text-white font-bold">내일 아침 08:00</span>부터 입금할 때까지 엔빵형의 정밀 타격 알림이 시작됩니다.
                </p>
            </div>

            <div class="text-center pt-2">
                <p class="text-[11px] text-gray-500 dark:text-gray-600">※ 입금 후 방장에게 입금 확인을 요청하면 독촉이 자동으로 취소됩니다.</p>
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuButton = document.getElementById('menu-button');
            const popupMenu = document.getElementById('popup-menu');
            const closeMenuButton = document.getElementById('close-menu-button');
            const themeToggleButton = document.getElementById('theme-toggle-button');
            const themeToggleText = document.getElementById('theme-toggle-text');
            const themeIcon = document.getElementById('theme-icon');
            const logoImage = document.getElementById('logo-image');
            
            const lightLogo = 'nBbro 로고_투명_가로.png';
            const darkLogo = 'nBbro 로고_투명다크_가로.png';
            const sunIcon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-8.66l-.707-.707M4.04 4.04l-.707-.707m15.92 0l-.707.707M4.04 19.96l-.707.707M21 12h-1M4 12H3m16.24-4.24l.707-.707M4.76 4.76l.707-.707M12 18a6 6 0 100-12 6 6 0 000 12z" />`;
            const moonIcon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;

            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    if (logoImage) logoImage.src = darkLogo;
                    themeToggleText.innerText = '라이트 모드';
                    themeIcon.innerHTML = sunIcon;
                } else {
                    document.documentElement.classList.remove('dark');
                    if (logoImage) logoImage.src = lightLogo;
                    themeToggleText.innerText = '다크 모드';
                    themeIcon.innerHTML = moonIcon;
                }
            }

            menuButton.addEventListener('click', () => popupMenu.classList.remove('hidden'));
            closeMenuButton.addEventListener('click', () => popupMenu.classList.add('hidden'));

            themeToggleButton.addEventListener('click', () => {
                const isDarkMode = document.documentElement.classList.contains('dark');
                const newTheme = isDarkMode ? 'light' : 'dark';
                localStorage.setItem('theme', newTheme);
                applyTheme(newTheme);
            });

            if (logoImage) { logoImage.addEventListener('click', () => { location.reload(); }); }

            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

            // 계좌 복사 로직
            document.getElementById('copyAccountBtn').addEventListener('click', () => {
                const accountText = document.getElementById('accountNumber').innerText;
                navigator.clipboard.writeText(accountText);
                alert('계좌번호가 복사되었습니다. 빠르게 송금해주세요.');
            });

            // URL 파라미터 반영
            const urlParams = new URLSearchParams(window.location.search);
            const owner = urlParams.get('owner');
            const amount = urlParams.get('amount');
            const bank = urlParams.get('bank');
            const account = urlParams.get('account');
            const mode = urlParams.get('mode');
            
            if (owner) document.getElementById('ownerName').innerText = decodeURIComponent(owner);
            if (amount) document.getElementById('perAmount').innerText = parseInt(amount).toLocaleString();
            if (bank) document.getElementById('bankName').innerText = decodeURIComponent(bank);
            if (account) document.getElementById('accountNumber').innerText = decodeURIComponent(account);
            
            if (mode === 'hard') {
                document.querySelector('#warningSection p:first-of-type').innerHTML = '현재 이 정산 링크는 <span class="text-gray-900 dark:text-white font-bold">"매운맛 독촉 모드"</span>가 활성화되어 있습니다.';
            } else {
                document.querySelector('#warningSection p:first-of-type').innerHTML = '현재 이 정산 링크는 <span class="text-gray-900 dark:text-white font-bold">"순한맛 알림 모드"</span>가 활성화되어 있습니다.';
            }
        });
    </script>
</body>

</html>
